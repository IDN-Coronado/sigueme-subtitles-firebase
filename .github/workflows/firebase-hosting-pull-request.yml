name: Deploy to Preview Channel

on:
  pull_request:
    # Optionally configure to run only for specific files. For example:
    # paths:
    # - "website/**"

jobs:
  build_and_preview:
    name: Build and Deploy to Firebase Hosting Preview Channel
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Set environment variables from secrets
        run: |
          touch .env
          echo VITE_API_KEY=${{ secrets.API_KEY }} >> .env
          echo VITE_AUTH_DOMAIN=${{ secrets.AUTH_DOMAIN }} >> .env
          echo VITE_PROJECT_ID=${{ secrets.PROJECT_ID }} >> .env
          echo VITE_STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }} >> .env
          echo VITE_MESSAGING_SENDER_ID=${{ secrets.MESSAGING_SENDER_ID }} >> .env
          echo VITE_APP_ID=${{ secrets.APP_ID }} >> .env
          echo VITE_MEASUREMENT_ID=${{ secrets.MEASUREMENT_ID }} >> .env

      - name: Install and Run
        run: npm install && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIGUEMESUBTITLES }}
          expires: 30d
          projectId: siguemesubtitles